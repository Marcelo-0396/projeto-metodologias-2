<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Cliente - Oliveira & Medeiros</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="logo">Oliveira <span>&</span> Medeiros</a>
  <div class="menu-toggle" id="mobile-menu">☰</div>
  <ul id="nav-list">
    <li><a href="index.html" class="nav-link">Início</a></li>
    <li><a href="processos.html" class="nav-link">Processos</a></li>
    <li><a href="login.html" class="nav-link active">Área do Cliente</a></li>
    <li><a href="admin.html" class="nav-link">Admin</a></li>
  </ul>
</nav>

<div class="page-container">
  <div class="box-card" style="max-width: 450px;">
    <h2 class="box-title">Área do Cliente</h2>
    <p class="box-subtitle">Aceda aos seus processos e documentos</p>
    
    <form id="formLogin">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>
      </div>
      
      <button type="submit" class="btn btn-fill" style="width: 100%; margin-top: 1rem;">Entrar</button>
      
      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="#" style="color: var(--muted); font-size: 0.8rem; font-family: sans-serif; text-decoration: none;">Esqueci minha senha</a>
      </div>
    </form>
  </div>
</div>

<script>
  const mobileMenu = document.getElementById('mobile-menu');
  const navList = document.getElementById('nav-list');
  mobileMenu.addEventListener('click', () => { navList.classList.toggle('show'); });

  document.getElementById('formLogin').addEventListener('submit', async function(e) {
    e.preventDefault(); 

    const emailDigitado = document.getElementById('email').value;
    const senhaDigitada = document.getElementById('senha').value;

    try {
      const resposta = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailDigitado, senha: senhaDigitada })
      });

      const dados = await resposta.json();

      if (dados.sucesso) {
        alert('Bem-vindo à Área do Cliente!');
      } else {
        alert('Acesso negado: ' + dados.mensagem);
      }
    } catch (erro) {
      console.error(erro);
      alert('Erro ao conectar com o servidor. Certifique-se de que o Node.js está rodando.');
    }
  });
</script>

</body>
</html>
