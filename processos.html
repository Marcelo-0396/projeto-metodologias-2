<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Processos - Oliveira & Medeiros</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="navbar">
  <a href="index.html" class="logo">Oliveira <span>&</span> Medeiros</a>
  <div class="menu-toggle" id="mobile-menu">☰</div>
  <ul id="nav-list">
    <li><a href="index.html" class="nav-link">Início</a></li>
    <li><a href="processos.html" class="nav-link active">Processos</a></li>
    <li><a href="login.html" class="nav-link">Área do Cliente</a></li>
    <li><a href="admin.html" class="nav-link">Admin</a></li>
  </ul>
</nav>

<div class="page-container">
  <div class="box-card" style="max-width: 600px; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
    <h2 class="box-title" style="color: var(--text);">Pesquisar processos por número</h2>
    <p class="box-subtitle">Digite o número do processo para localizar.</p>
    
    <form onsubmit="event.preventDefault(); alert('Busca de processo em desenvolvimento!');" style="display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap;">
      <input type="text" placeholder="Digite o número do processo" required style="flex: 1; min-width: 250px;">
      <button type="submit" class="btn btn-fill">Pesquisar</button>
    </form>
  </div>
</div>

<script>
  const mobileMenu = document.getElementById('mobile-menu');
  const navList = document.getElementById('nav-list');
  mobileMenu.addEventListener('click', () => { navList.classList.toggle('show'); });
</script>

</body>
</html>
